name: Code Quality

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/scientific-release/backend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./projects/scientific-release/backend
        run: npm ci
      
      - name: Run ESLint
        working-directory: ./projects/scientific-release/backend
        run: npm run lint || echo "Linting failed"

  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          find . -name "*.json" -not -path "*/node_modules/*" -not -path "*/.git/*" | while read file; do
            if ! python3 -c "import json; json.load(open('$file'))"; then
              echo "❌ Invalid JSON: $file"
              exit 1
            fi
          done
          echo "✅ All JSON files are valid"

  check-sensitive-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for sensitive data
        run: |
          echo "Checking for sensitive data..."
          
          # Check for exposed URLs in public docs
          if grep -r "sf\.dexoconnect\.com" README.md 2>/dev/null; then
            echo "❌ Production URL found in README.md"
            exit 1
          fi
          
          # Check for exposed AppID in public docs
          if grep -r "wxa914ecc15836bda6" README.md 2>/dev/null; then
            echo "❌ WeChat AppID found in README.md"
            exit 1
          fi
          
          echo "✅ No sensitive data found in public docs"
